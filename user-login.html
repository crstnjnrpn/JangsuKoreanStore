<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="user.css">
    <title>Jangsu Korean Store - Login</title>
</head>
<body>

    <!-- Navigation Bar -->
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="KStore Logo">
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about-us.html">About Us</a>
        </nav>

        <div class="header-actions">
            <!-- Cart Icon with Badge -->
            <div class="cart-icon" id="cart-icon">
                🛒
                <span class="cart-badge" id="cart-badge">0</span>
            </div>
        </div>
    </header>

    <!-- Login Page Content -->
    <main class="login-page">
        <div class="login-container">
            
            <!-- Page Title -->
            <h1 class="login-title">Login</h1>
            
            <!-- Breadcrumb -->
            <div class="login-breadcrumb">
                <a href="index.html">Home</a>
                <span class="separator">/</span>
                <span>Login</span>
            </div>
            
            <!-- Login Form -->
            <div class="login-form-container">
                
                <h2 class="login-form-title">Welcome Back!</h2>
                
                <form id="login-form" class="login-form">
                    
                    <!-- Username Field -->
                    <div class="form-group">
                        <label for="username">Username or Email</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username or email" required>
                    </div>
                    
                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <!-- Sign In Button -->
                    <button type="submit" class="login-btn">Sign In</button>
                    
                    <!-- Sign Up Link -->
                    <div class="signup-link">
                        Don't Have An Account? <a href="user-signup.html">Sign Up</a>
                    </div>
                    
                </form>
                
            </div>
            
        </div>
    </main>

    <!-- Cart Sidebar Component -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Shopping Cart (<span id="cart-count">0</span>)</h2>
            <button class="close-cart-btn" id="close-cart">×</button>
        </div>
        <div class="cart-items-container" id="cart-items-container">
            <div class="empty-cart" id="empty-cart">
                <div class="empty-cart-icon">🛒</div>
                <p>Your cart is empty</p>
                <p class="empty-cart-hint">Browse our products and add items to your cart</p>
            </div>
            <div class="cart-items-list" id="cart-items-list"></div>
        </div>
        <div class="cart-footer" id="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span class="total-amount" id="cart-total">₱0.00</span>
            </div>
            <button class="view-order-btn" id="view-order-btn">View Order</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <a href="#">Contact Us</a>
        <span class="separator">|</span>
        <a href="#">Privacy Policy</a>
        <span class="copyright">© 2026 Jangsu Korean Store</span>
    </footer>

    <script type="module" src="cart-system.js"></script>
    <script type="module" src="user-system.js"></script>
    
    <!-- Login Form Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Clear any existing session when on login page
            localStorage.removeItem('userData');
            localStorage.removeItem('userLoggedIn');
            localStorage.removeItem('userRole');
            localStorage.removeItem('adminLoggedIn');
            console.log("Login page loaded - session cleared");
            
            const loginForm = document.getElementById('login-form');
            
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    
                    if (!username || !password) {
                        alert('Please enter both username and password');
                        return;
                    }
                    
                    // Admin login check
                    if (password.toLowerCase().includes('adminjangsu')) {
                        const adminData = {
                            username: username,
                            name: username,
                            initials: username.substring(0, 2).toUpperCase(),
                            email: 'admin@jangsu.com',
                            phone: '+63 XXX XXX XXXX',
                            role: 'admin'
                        };
                        
                        localStorage.setItem('userData', JSON.stringify(adminData));
                        localStorage.setItem('userLoggedIn', 'true');
                        localStorage.setItem('userRole', 'admin');
                        localStorage.setItem('adminLoggedIn', 'true');
                        
                        alert('✓ Admin login successful! Redirecting to dashboard...');
                        
                        setTimeout(function() {
                            window.location.href = 'admin-dashboard.html';
                        }, 1500);
                        return;
                    }
                    
                    // Regular user login
                    const existingUsers = JSON.parse(localStorage.getItem('allUsers') || '[]');
                    let foundUser = null;
                    
                    for (let i = 0; i < existingUsers.length; i++) {
                        if ((existingUsers[i].username === username || existingUsers[i].email === username) && 
                            existingUsers[i].password === password) {
                            foundUser = existingUsers[i];
                            break;
                        }
                    }
                    
                    if (foundUser) {
                        localStorage.setItem('userData', JSON.stringify(foundUser.userData));
                        localStorage.setItem('userLoggedIn', 'true');
                        localStorage.setItem('userRole', 'user');
                        localStorage.removeItem('adminLoggedIn');
                        
                        alert('✓ Welcome back, ' + foundUser.username + '!');
                        
                        // Check if there's a redirect URL
                        const redirectUrl = localStorage.getItem('redirectAfterLogin');
                        localStorage.removeItem('redirectAfterLogin');
                        
                        setTimeout(function() {
                            if (redirectUrl && redirectUrl !== '/user-login.html' && redirectUrl !== '/user-signup.html') {
                                window.location.href = redirectUrl;
                            } else {
                                window.location.href = 'index.html';
                            }
                        }, 1500);
                    } else {
                        // Check if user exists
                        const userExists = existingUsers.some(function(u) { 
                            return u.username === username || u.email === username; 
                        });
                        
                        if (userExists) {
                            alert('Incorrect password. Please try again.');
                        } else {
                            alert('Account not found. Please sign up first.');
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>

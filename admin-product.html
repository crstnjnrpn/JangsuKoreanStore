<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="admin.css">
    <title>Jangsu Korean Store - Admin Products</title>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin Dashboard</h2>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">General</div>
                    <a href="admin-dashboard.html" class="nav-item">Dashboard</a>
                    <a href="admin-order.html" class="nav-item">Orders</a>
                    <a href="admin-product.html" class="nav-item active">Products</a>
                    <a href="admin-inventory.html" class="nav-item">Inventory</a>
                </div>
                <div class="nav-section">
                    <a href="admin-settings.html" class="nav-item">
                        <span class="nav-icon">⚙️</span> Settings
                    </a>
                </div>
                <div class="nav-section" style="margin-top: auto; padding-top: 20px; border-top: 1px solid #34495e;">
                    <a href="#" class="nav-item" id="admin-sidebar-logout" style="color: #ff6b6b;">
                        <span class="nav-icon">🚪</span> Logout
                    </a>
                </div>
            </nav>
        </aside>

        <main class="main-content-product">
            <div class="page-header">
                <h1 class="page-title">Products</h1>
                <div class="welcome-message">
                    <span class="welcome-text">Welcome,</span>
                    <span class="admin-name">Admin</span>
                </div>
            </div>
            
            <h2 class="section-title">General</h2>
            <h3 class="subsection-title">Products</h3>
            
            <div class="products-table-container">
                <div class="table-header">
                    <div class="table-row header-row">
                        <div class="table-cell product-image-col">Product Image</div>
                        <div class="table-cell product-name-col">Product Name</div>
                        <div class="table-cell category-col">Category</div>
                        <div class="table-cell price-col">Price</div>
                        <div class="table-cell stock-col">Current Stock</div>
                        <div class="table-cell reserved-col">Reserved Stock</div>
                        <div class="table-cell stock-col">Available</div>
                        <div class="table-cell status-col">Status</div>
                        <div class="table-cell actions-col">Actions</div>
                    </div>
                </div>
                <div class="table-body" id="productsTableBody">
                    <div style="text-align: center; padding: 50px;">Loading products...</div>
                </div>
            </div>
            
            <div class="add-product-container">
                <a href="add-product.html" class="add-product-btn">
                    <span class="btn-icon">➕</span> Add Product
                </a>
            </div>
        </main>
    </div>

    <script type="module" src="admin-system.js"></script>
</body>
</html>

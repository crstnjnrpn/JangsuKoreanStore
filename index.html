<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="user.css">
    
    <script src="cart-system.js"></script>
    <script type="module" src="user-system.js"></script>
    <title>Jangsu Korean Store - Home</title>
</head>
<body>

    <!-- Navigation Bar -->
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="KStore Logo">
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about-us.html">About Us</a>
        </nav>

        <div class="header-actions">
            <!-- Cart Icon with Badge -->
            <div class="cart-icon" id="cart-icon">
                🛒
                <span class="cart-badge" id="cart-badge">0</span>
            </div>
            
            <!-- Profile Icon -->
            <a href="user-profile.html" class="profile-icon-link">
                <svg class="profile-svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm-2 9a4 4 0 0 0-4 4v1a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-1a4 4 0 0 0-4-4h-4Z"/>
                </svg>
            </a>
        </div>
    </header>

    <!-- Shop Now Section -->
    <section class="shop-now">
        <img src="images/banner.jpg" alt="Korean Store Banner" class="banner-image">
        <div class="shopnow-text">
            <h1>Discover Authentic Korean Goods</h1>
            <a href="products.html" class="btn">Shop Now</a>
        </div>
    </section>

    <!-- Category Section with Filter Links -->
    <section class="categories">
        <div class="category-card">
            <h2>Drinks</h2>
            <img src="images/drinks.jpg" alt="Drinks">
            <br>
            <a href="products.html?category=Drinks" class="btn-small">View All</a>
        </div>

        <div class="category-card">
            <h2>Noodles</h2>
            <img src="images/noodles.jpg" alt="Noodles">
            <br>
            <a href="products.html?category=Ramen" class="btn-small">View All</a>
        </div>

        <div class="category-card">
            <h2>Snacks</h2>
            <img src="images/snacks.jpg" alt="Snacks">
            <br>
            <a href="products.html?category=Snacks" class="btn-small">View All</a>
        </div>
    </section>

    <!-- Best Seller Section with Grid Layout -->
    <section class="best-seller-section">
        <h2>BEST SELLERS</h2>
        <div class="best-seller-grid" id="best-seller-grid">
            <!-- Best seller products will be dynamically inserted here -->
        </div>
    </section>

    <!-- Cart Sidebar Component -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Shopping Cart (<span id="cart-count">0</span>)</h2>
            <button class="close-cart-btn" id="close-cart">×</button>
        </div>
        
        <div class="cart-items-container" id="cart-items-container">
            <div class="empty-cart" id="empty-cart">
                <div class="empty-cart-icon">🛒</div>
                <p>Your cart is empty</p>
                <p class="empty-cart-hint">Add items to get started</p>
            </div>
            <div class="cart-items-list" id="cart-items-list"></div>
        </div>
        
        <div class="cart-footer" id="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span class="total-amount" id="cart-total">₱0.00</span>
            </div>
            <button class="view-order-btn" id="view-order-btn">View Order</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <a href="https://www.facebook.com/profile.php?id=61563538805687">Visit our Facebook Page</a>
        <span class="separator">|</span>
        <a href="#">Privacy Policy</a>
        <span class="copyright">© 2026 Jangsu Korean Store</span>
    </footer>

    <!-- Best Sellers Loader -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmgqAxUzxgJqvYLPNoATqA3hBLYla2PR0",
            authDomain: "jangsukoreanstore-12ba2.firebaseapp.com",
            projectId: "jangsukoreanstore-12ba2",
            storageBucket: "jangsukoreanstore-12ba2.firebasestorage.app",
            messagingSenderId: "935502137643",
            appId: "1:935502137643:web:454fc81b20e3c1b5ae9d6e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadBestSellers() {
            const container = document.getElementById('best-seller-grid');
            if (!container) return;
            
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                const products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                
                // Get first 4 active products as best sellers
                const bestSellers = products.filter(p => p.status === 'Active').slice(0, 4);
                
                if (bestSellers.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px;">No products available</div>';
                    return;
                }
                
                let html = '';
                for (const product of bestSellers) {
                    const imageUrl = product.image || 'images/default.jpg';
                    html += `
                        <div class="best-seller-card" onclick="location.href='order.html?product=${product.id}';">
                            <img src="${imageUrl}" alt="${product.name}" onerror="this.src='images/default.jpg'">
                            <h3>${escapeHtml(product.name)}</h3>
                            <p class="price">₱${(product.price || 0).toFixed(2)}</p>
                            <button class="btn-small" onclick="event.stopPropagation(); window.addToCartFromProducts('${product.id}', '${escapeHtml(product.name)}', ${product.price}, '${imageUrl}')">Add to Cart</button>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
            } catch (error) {
                console.error("Error loading best sellers:", error);
                container.innerHTML = '<div style="text-align: center; padding: 20px;">Error loading products</div>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadBestSellers();
    </script>
    
    <!-- Fix for addToCartFromProducts to work with string IDs -->
    <script>
        // Override the addToCartFromProducts function to work with string IDs from Firebase
        window.addToCartFromProducts = function(id, name, price, image) {
            var cart = localStorage.getItem('shoppingCart');
            var cartItems = cart ? JSON.parse(cart) : [];
            
            var existing = null;
            for (var i = 0; i < cartItems.length; i++) {
                if (cartItems[i].id == id) {
                    existing = cartItems[i];
                    break;
                }
            }
            
            if (existing) {
                existing.quantity += 1;
            } else {
                cartItems.push({
                    id: id,
                    name: name,
                    price: price,
                    image: image,
                    quantity: 1
                });
            }
            
            localStorage.setItem('shoppingCart', JSON.stringify(cartItems));
            alert('Added ' + name + ' to cart!');
            
            // Update badge
            var totalItems = 0;
            for (var i = 0; i < cartItems.length; i++) {
                totalItems += cartItems[i].quantity;
            }
            var badge = document.getElementById('cart-badge');
            if (badge) {
                badge.textContent = totalItems;
                badge.style.display = totalItems > 0 ? 'flex' : 'none';
            }
            
            // Open cart sidebar
            if (typeof window.openCart === 'function') {
                window.openCart();
            }
        };
    </script>
    <script>
        // Check if user is logged in before going to profile
        document.querySelector('.profile-icon-link')?.addEventListener('click', function(e) {
            const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
            if (!isLoggedIn) {
                e.preventDefault();
                alert('Please log in or sign up to access your profile');
                window.location.href = 'user-login.html';
            }
        });
    </script>
</body>
</html>

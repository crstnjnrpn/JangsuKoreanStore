<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="user.css">
    <title>Jangsu Korean Store - Products</title>
</head>
<body>

    <!-- Navigation Bar -->
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="KStore Logo">
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about-us.html">About Us</a>
        </nav>

        <div class="header-actions">
            <div class="cart-icon" id="cart-icon">
                🛒
                <span class="cart-badge" id="cart-badge">0</span>
            </div>
            <a href="user-profile.html" class="profile-icon-link">
                <svg class="profile-svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm-2 9a4 4 0 0 0-4 4v1a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-1a4 4 0 0 0-4-4h-4Z"/>
                </svg>
            </a>
        </div>
    </header>

    <!-- Category Filter Section -->
    <section class="product-filter">
        <div class="filter-container">
            <span class="filter-label">Category:</span>
            <div class="category-dropdown-wrapper">
                <select id="category" class="category-select">
                    <option value="all">All Items</option>
                    <option value="Drinks">Drinks</option>
                    <option value="Ramen">Ramen / Noodles</option>
                    <option value="Snacks">Snacks</option>
                    <option value="Sauces">Sauces</option>
                    <option value="Frozen">Frozen</option>
                    <option value="Other">Other</option>
                </select>
                <span class="dropdown-arrow">▼</span>
            </div>
        </div>
    </section>

    <!-- Products Grid Section -->
    <section class="products-section">
        <div class="products-container" id="products-container">
            <div style="text-align: center; padding: 50px;">Loading products from database...</div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <a href="https://www.facebook.com/profile.php?id=61563538805687">Visit our Facebook Page</a>
        <span class="separator">|</span>
        <a href="#">Privacy Policy</a>
        <span class="copyright">© 2026 Jangsu Korean Store</span>
    </footer>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Shopping Cart (<span id="cart-count">0</span>)</h2>
            <button class="close-cart-btn" id="close-cart">×</button>
        </div>
        <div class="cart-items-container" id="cart-items-container">
            <div class="empty-cart" id="empty-cart">
                <div class="empty-cart-icon">🛒</div>
                <p>Your cart is empty</p>
                <p class="empty-cart-hint">Browse our products and add items to your cart</p>
            </div>
            <div class="cart-items-list" id="cart-items-list"></div>
        </div>
        <div class="cart-footer" id="cart-footer">
            <div class="cart-total">
                <span>Estimated Total:</span>
                <span class="total-amount" id="cart-total">₱0.00</span>
            </div>
            <button class="view-order-btn" id="view-order-btn">View Order</button>
        </div>
    </div>

    <script type="module" src="cart-system.js"></script>
    <script type="module" src="user-system.js"></script>
    
    <!-- Firebase Products Loader -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmgqAxUzxgJqvYLPNoATqA3hBLYla2PR0",
            authDomain: "jangsukoreanstore-12ba2.firebaseapp.com",
            projectId: "jangsukoreanstore-12ba2",
            storageBucket: "jangsukoreanstore-12ba2.firebasestorage.app",
            messagingSenderId: "935502137643",
            appId: "1:935502137643:web:454fc81b20e3c1b5ae9d6e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProducts = [];

        async function loadProductsFromFirebase() {
            const container = document.getElementById('products-container');
            if (!container) return;
            
            container.innerHTML = '<div style="text-align: center; padding: 50px;">Loading products...</div>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                allProducts = [];
                querySnapshot.forEach((doc) => {
                    allProducts.push({ id: doc.id, ...doc.data() });
                });
                
                console.log("Products loaded from Firebase:", allProducts.length);
                
                // Get category from URL parameter
                const urlParams = new URLSearchParams(window.location.search);
                const categoryParam = urlParams.get('category');
                
                // Get category from dropdown
                const categorySelect = document.getElementById('category');
                let selectedCategory = categorySelect ? categorySelect.value : 'all';
                
                // If URL has category parameter, override dropdown and select it
                if (categoryParam) {
                    selectedCategory = categoryParam;
                    if (categorySelect) {
                        categorySelect.value = categoryParam;
                    }
                    // Update URL without reloading the page
                    const newUrl = window.location.pathname + '?category=' + categoryParam;
                    window.history.pushState({}, '', newUrl);
                }
                
                // Filter products
                let filteredProducts = allProducts;
                if (selectedCategory !== 'all') {
                    filteredProducts = allProducts.filter(p => p.category === selectedCategory);
                }
                
                console.log("Filtered products:", filteredProducts.length, "Category:", selectedCategory);
                
                if (filteredProducts.length === 0) {
                    container.innerHTML = `<div style="text-align: center; padding: 50px;">No products found in "${selectedCategory}" category. Add some products in the admin panel.</div>`;
                    return;
                }
                
                let html = '';
                for (const product of filteredProducts) {
                    // Only show active products
                    if (product.status !== 'Active') continue;
                    
                    const imageUrl = product.image || 'images/default.jpg';
                    html += `
                        <div class="product-card" onclick="location.href='order.html?product=${product.id}'">
                            <img src="${imageUrl}" alt="${product.name}" onerror="this.src='images/default.jpg'">
                            <h3>${escapeHtml(product.name)}</h3>
                            <p class="price">₱${(product.price || 0).toFixed(2)}</p>
                            <button class="btn-small view-product" onclick="event.stopPropagation(); location.href='order.html?product=${product.id}'">View Product</button>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
            } catch (error) {
                console.error("Error loading products:", error);
                container.innerHTML = '<div style="text-align: center; padding: 50px; color: red;">Error loading products. Please try again later.</div>';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Handle dropdown change
        function handleCategoryChange() {
            const categorySelect = document.getElementById('category');
            const selectedCategory = categorySelect.value;
            
            // Update URL with new category
            let newUrl = window.location.pathname;
            if (selectedCategory !== 'all') {
                newUrl += '?category=' + encodeURIComponent(selectedCategory);
            }
            window.history.pushState({}, '', newUrl);
            
            // Reload products with new filter
            loadProductsFromFirebase();
        }
        
        // Load products on page load
        await loadProductsFromFirebase();
        
        // Add event listener for dropdown
        const categorySelect = document.getElementById('category');
        if (categorySelect) {
            categorySelect.addEventListener('change', handleCategoryChange);
        }
        
        // Listen for browser back/forward buttons
        window.addEventListener('popstate', function() {
            loadProductsFromFirebase();
        });
    </script>
</body>
</html>

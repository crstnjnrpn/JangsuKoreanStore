<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="user.css">
    <title>Jangsu Korean Store - Products</title>
    <style>
        /* Stock Status Badge Styles */
        .stock-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 5px;
        }
        .stock-instock {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }
        .stock-lowstock {
            background-color: #fff3e0;
            color: #f57c00;
            border: 1px solid #ffe0b2;
        }
        .stock-outofstock {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }
        .product-card {
            position: relative;
        }
        .stock-status-container {
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="images/logo.png" alt="KStore Logo">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about-us.html">About Us</a>
        </nav>
        <div class="header-actions">
            <div class="cart-icon" id="cart-icon">
                🛒
                <span class="cart-badge" id="cart-badge">0</span>
            </div>
            <a href="user-profile.html" class="profile-icon-link">
                <svg class="profile-svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm-2 9a4 4 0 0 0-4 4v1a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-1a4 4 0 0 0-4-4h-4Z"/>
                </svg>
            </a>
        </div>
    </header>

    <section class="product-filter">
        <div class="filter-container">
            <span class="filter-label">Category:</span>
            <div class="category-dropdown-wrapper">
                <select id="category" class="category-select">
                    <option value="all">All Items</option>
                    <option value="Drinks">Drinks</option>
                    <option value="Ramen">Ramen / Noodles</option>
                    <option value="Snacks">Snacks</option>
                    <option value="Sauces">Sauces</option>
                    <option value="Frozen">Frozen</option>
                    <option value="Other">Other</option>
                </select>
                <span class="dropdown-arrow">▼</span>
            </div>
        </div>
    </section>

    <section class="products-section">
        <div class="products-container" id="products-container">
            <div style="text-align: center; padding: 50px;">Loading products...</div>
        </div>
    </section>

    <footer>
        <a href="https://www.facebook.com/profile.php?id=61563538805687">Visit our Facebook Page</a>
        <span class="separator">|</span>
        <a href="#">Privacy Policy</a>
        <span class="copyright">© 2026 Jangsu Korean Store</span>
    </footer>

    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Shopping Cart (<span id="cart-count">0</span>)</h2>
            <button class="close-cart-btn" id="close-cart">×</button>
        </div>
        <div class="cart-items-container" id="cart-items-container">
            <div class="empty-cart" id="empty-cart">
                <div class="empty-cart-icon">🛒</div>
                <p>Your cart is empty</p>
                <p class="empty-cart-hint">Browse our products and add items to your cart</p>
            </div>
            <div class="cart-items-list" id="cart-items-list"></div>
        </div>
        <div class="cart-footer" id="cart-footer">
            <div class="cart-total">
                <span>Estimated Total:</span>
                <span class="total-amount" id="cart-total">₱0.00</span>
            </div>
            <button class="view-order-btn" id="view-order-btn">View Order</button>
        </div>
    </div>

    <script src="cart-system.js"></script>
    <script src="user-system.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmgqAxUzxgJqvYLPNoATqA3hBLYla2PR0",
            authDomain: "jangsukoreanstore-12ba2.firebaseapp.com",
            projectId: "jangsukoreanstore-12ba2",
            storageBucket: "jangsukoreanstore-12ba2.firebasestorage.app",
            messagingSenderId: "935502137643",
            appId: "1:935502137643:web:454fc81b20e3c1b5ae9d6e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProducts = [];

        // Function to determine stock status
        function getStockStatus(product) {
            const currentStock = product.currentStock || 0;
            const reservedStock = product.reservedStock || 0;
            const availableStock = currentStock - reservedStock;
            const lowStockThreshold = product.lowStockThreshold || 10;
            
            if (availableStock <= 0) {
                return { status: 'outofstock', text: 'OUT OF STOCK', class: 'stock-outofstock' };
            } else if (availableStock < lowStockThreshold) {
                return { status: 'lowstock', text: '⚠️ LOW STOCK', class: 'stock-lowstock' };
            } else {
                return { status: 'instock', text: '✓ IN STOCK', class: 'stock-instock' };
            }
        }

        async function loadProductsFromFirebase() {
            const container = document.getElementById('products-container');
            if (!container) return;
            
            container.innerHTML = '<div style="text-align: center; padding: 50px;">Loading products...</div>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                allProducts = [];
                querySnapshot.forEach((doc) => {
                    allProducts.push({ id: doc.id, ...doc.data() });
                });
                
                console.log("Products loaded:", allProducts.length);
                
                const categorySelect = document.getElementById('category');
                const selectedCategory = categorySelect ? categorySelect.value : 'all';
                
                let filteredProducts = allProducts;
                if (selectedCategory !== 'all') {
                    filteredProducts = allProducts.filter(p => p.category === selectedCategory);
                }
                
                if (filteredProducts.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 50px;">No products found in this category.</div>';
                    return;
                }
                
                let html = '';
                for (const product of filteredProducts) {
                    // Only show active products
                    if (product.status !== 'Active') continue;
                    
                    const imageUrl = product.image || 'images/default.jpg';
                    const stockInfo = getStockStatus(product);
                    const availableStock = (product.currentStock || 0) - (product.reservedStock || 0);
                    const isOutOfStock = availableStock <= 0;
                    
                    html += `
                        <div class="product-card" onclick="location.href='order.html?product=${product.id}'" style="opacity: ${isOutOfStock ? '0.6' : '1'};">
                            <div class="stock-status-container">
                                <span class="stock-badge ${stockInfo.class}">${stockInfo.text}</span>
                            </div>
                            <img src="${imageUrl}" alt="${product.name}" onerror="this.src='images/default.jpg'">
                            <h3>${escapeHtml(product.name)}</h3>
                            <p class="price">₱${(product.price || 0).toFixed(2)}</p>
                            ${isOutOfStock ? '<p style="color: #c62828; font-size: 12px; margin-top: -10px;">Not available for order</p>' : ''}
                            <button class="btn-small view-product" onclick="event.stopPropagation(); location.href='order.html?product=${product.id}'" ${isOutOfStock ? 'disabled style="background: #ccc; cursor: not-allowed;"' : ''}>${isOutOfStock ? 'Out of Stock' : 'View Product'}</button>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
            } catch (error) {
                console.error("Error loading products:", error);
                container.innerHTML = '<div style="text-align: center; padding: 50px; color: red;">Error loading products</div>';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load products on page load
        loadProductsFromFirebase();
        
        // Filter change listener
        const categorySelect = document.getElementById('category');
        if (categorySelect) {
            categorySelect.addEventListener('change', loadProductsFromFirebase);
        }
        
        // Make function global for refresh
        window.refreshProducts = loadProductsFromFirebase;
    </script>
</body>
</html>

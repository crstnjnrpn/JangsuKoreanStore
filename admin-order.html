<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="admin.css">
    <title>Jangsu Korean Store - Admin Orders</title>
    <style>
        .call-btn {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
            text-decoration: none;
            display: inline-block;
        }
        .call-btn:hover {
            background-color: #128C7E;
        }
        .whatsapp-btn {
            background-color: #25D366;
        }
        .phone-number {
            font-weight: 600;
            color: #2c3e50;
        }
        .filter-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .filter-bar select, .filter-bar input {
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        .refresh-btn {
            padding: 8px 20px;
            background: #1f6fd1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .refresh-btn:hover {
            background: #155ab3;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin Dashboard</h2>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">General</div>
                    <a href="admin-dashboard.html" class="nav-item">Dashboard</a>
                    <a href="admin-order.html" class="nav-item active">Orders</a>
                    <a href="admin-product.html" class="nav-item">Products</a>
                    <a href="admin-inventory.html" class="nav-item">Inventory</a>
                </div>
                <div class="nav-section">
                    <a href="admin-settings.html" class="nav-item">
                        <span class="nav-icon">⚙️</span> Settings
                    </a>
                </div>
                <div class="nav-section" style="margin-top: auto; padding-top: 20px; border-top: 1px solid #34495e;">
                    <a href="#" class="nav-item" id="admin-sidebar-logout" style="color: #ff6b6b;">
                        <span class="nav-icon">🚪</span> Logout
                    </a>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Customer Orders</h1>
                <div class="welcome-message">
                    <span class="welcome-text">Welcome,</span>
                    <span class="admin-name" id="admin-name">Admin</span>
                </div>
            </div>
            
            <h2 class="section-title">All Orders</h2>
            
            <!-- Filter Bar -->
            <div class="filter-bar">
                <div>
                    <label style="font-weight: 600;">Filter by Status:</label>
                    <select id="admin-order-filter">
                        <option value="all">All Orders</option>
                        <option value="Pending">Pending</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Ready for Pickup">Ready for Pickup</option>
                        <option value="Completed">Completed</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <div>
                    <label style="font-weight: 600;">Search:</label>
                    <input type="text" id="admin-order-search" placeholder="Order # or Customer" style="width: 200px;">
                </div>
                <button id="admin-refresh-orders" class="refresh-btn">🔄 Refresh</button>
            </div>
            
            <div class="orders-table-container">
                <div class="table-header">
                    <div class="table-row header-row">
                        <div class="table-cell">Order #</div>
                        <div class="table-cell">Customer</div>
                        <div class="table-cell">Phone Number</div>
                        <div class="table-cell">Date</div>
                        <div class="table-cell">Total</div>
                        <div class="table-cell">Status</div>
                        <div class="table-cell">Actions</div>
                    </div>
                </div>
                <div class="table-body" id="orders-table-body">
                    <div style="text-align: center; padding: 50px;">Loading orders...</div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmgqAxUzxgJqvYLPNoATqA3hBLYla2PR0",
            authDomain: "jangsukoreanstore-12ba2.firebaseapp.com",
            projectId: "jangsukoreanstore-12ba2",
            storageBucket: "jangsukoreanstore-12ba2.firebasestorage.app",
            messagingSenderId: "935502137643",
            appId: "1:935502137643:web:454fc81b20e3c1b5ae9d6e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allOrders = [];

        async function loadAdminOrders() {
            const tbody = document.getElementById('orders-table-body');
            if (!tbody) return;
            
            try {
                const querySnapshot = await getDocs(collection(db, "orders"));
                allOrders = [];
                querySnapshot.forEach((doc) => {
                    allOrders.push({ id: doc.id, ...doc.data() });
                });
                
                allOrders.sort((a, b) => new Date(b.orderDate) - new Date(a.orderDate));
                
                const filterValue = document.getElementById('admin-order-filter')?.value || 'all';
                const searchTerm = document.getElementById('admin-order-search')?.value.toLowerCase() || '';
                
                let filteredOrders = allOrders;
                if (filterValue !== 'all') {
                    filteredOrders = allOrders.filter(order => order.status === filterValue);
                }
                if (searchTerm) {
                    filteredOrders = filteredOrders.filter(order => 
                        order.orderNumber?.toLowerCase().includes(searchTerm) ||
                        order.customerName?.toLowerCase().includes(searchTerm) ||
                        order.customerPhone?.toLowerCase().includes(searchTerm)
                    );
                }
                
                if (filteredOrders.length === 0) {
                    tbody.innerHTML = '<div style="text-align: center; padding: 50px;">No orders found.</div>';
                    return;
                }
                
                let html = '';
                for (const order of filteredOrders) {
                    const orderDate = order.orderDate ? new Date(order.orderDate).toLocaleDateString() : 'N/A';
                    const customerPhone = order.customerPhone || 'Not provided';
                    const cleanPhone = customerPhone.replace(/[^0-9]/g, '');
                    
                    let statusClass = '';
                    switch(order.status) {
                        case 'Pending': statusClass = 'status-badge pending'; break;
                        case 'Confirmed': statusClass = 'status-badge confirmed'; break;
                        case 'Ready for Pickup': statusClass = 'status-badge ready'; break;
                        case 'Completed': statusClass = 'status-badge delivered'; break;
                        case 'Cancelled': statusClass = 'status-badge cancelled'; break;
                        default: statusClass = 'status-badge pending';
                    }
                    
                    html += `
                        <div class="table-row data-row">
                            <div class="table-cell" data-label="Order #">${order.orderNumber || order.id.substring(0, 8)}</div>
                            <div class="table-cell" data-label="Customer">
                                ${escapeHtml(order.customerName || order.customerUsername || 'Guest')}
                                ${order.customerEmail && order.customerEmail !== 'guest@example.com' ? `<br><small style="color:#888;">${order.customerEmail}</small>` : ''}
                            </div>
                            <div class="table-cell" data-label="Phone">
                                <span class="phone-number">${escapeHtml(customerPhone)}</span>
                                ${customerPhone !== 'Not provided' && customerPhone !== '+63 XXX XXX XXXX' ? `
                                    <a href="tel:${customerPhone}" class="call-btn" title="Call Customer">📞 Call</a>
                                    <a href="https://wa.me/${cleanPhone}" target="_blank" class="call-btn whatsapp-btn" title="WhatsApp">💬 WhatsApp</a>
                                ` : ''}
                            </div>
                            <div class="table-cell" data-label="Date">${orderDate}</div>
                            <div class="table-cell" data-label="Total">₱${(order.total || 0).toFixed(2)}</div>
                            <div class="table-cell" data-label="Status">
                                <select class="status-select" data-order-id="${order.id}" data-current-status="${order.status}" style="padding: 5px 10px; border-radius: 5px;">
                                    <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                    <option value="Confirmed" ${order.status === 'Confirmed' ? 'selected' : ''}>Confirmed</option>
                                    <option value="Ready for Pickup" ${order.status === 'Ready for Pickup' ? 'selected' : ''}>Ready for Pickup</option>
                                    <option value="Completed" ${order.status === 'Completed' ? 'selected' : ''}>Completed</option>
                                    <option value="Cancelled" ${order.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                                </select>
                            </div>
                            <div class="table-cell" data-label="Actions">
                                <button class="view-order-detail" data-order-id="${order.id}" style="padding: 5px 15px; background: #1f6fd1; color: white; border: none; border-radius: 5px; cursor: pointer;">📋 View Details</button>
                            </div>
                        </div>
                    `;
                }
                tbody.innerHTML = html;
                
                // Add event listeners for status changes
                document.querySelectorAll('.status-select').forEach(select => {
                    select.addEventListener('change', async (e) => {
                        const orderId = select.getAttribute('data-order-id');
                        const newStatus = select.value;
                        if (confirm(`Change order status to ${newStatus}?`)) {
                            try {
                                await updateDoc(doc(db, "orders", orderId), {
                                    status: newStatus,
                                    updatedAt: new Date().toISOString()
                                });
                                alert(`Order status updated to ${newStatus}`);
                                loadAdminOrders();
                            } catch (error) {
                                alert("Error updating status: " + error.message);
                            }
                        } else {
                            const originalStatus = select.getAttribute('data-current-status');
                            select.value = originalStatus;
                        }
                    });
                });
                
                // Add event listeners for view details
                document.querySelectorAll('.view-order-detail').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const orderId = btn.getAttribute('data-order-id');
                        window.location.href = `admin-order-detail.html?id=${orderId}`;
                    });
                });
                
            } catch (error) {
                console.error("Error loading orders:", error);
                tbody.innerHTML = '<div style="text-align: center; padding: 50px; color: red;">Error loading orders: ' + error.message + '</div>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Set up event listeners
        document.getElementById('admin-order-filter')?.addEventListener('change', () => loadAdminOrders());
        document.getElementById('admin-order-search')?.addEventListener('input', () => loadAdminOrders());
        document.getElementById('admin-refresh-orders')?.addEventListener('click', () => loadAdminOrders());
        
        // Admin name
        const userData = localStorage.getItem('userData');
        const adminUser = userData ? JSON.parse(userData) : null;
        if (adminUser) document.getElementById('admin-name').textContent = adminUser.name || adminUser.username || 'Admin';
        
        // Logout
        document.getElementById('admin-sidebar-logout')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('Are you sure you want to log out?')) {
                localStorage.removeItem('userData');
                localStorage.removeItem('userLoggedIn');
                localStorage.removeItem('userRole');
                localStorage.removeItem('adminLoggedIn');
                window.location.href = 'index.html';
            }
        });
        
        // Load orders
        loadAdminOrders();
        
        // Auto refresh every 30 seconds
        setInterval(loadAdminOrders, 30000);
    </script>
</body>
</html>
